name: Modrinth App release
on:
  workflow_run:
    workflows: ['Modrinth App build']
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Release JS Gaming App
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: theseus-build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: App bundle (x86_64-pc-windows-msvc)
          path: windows-build

      - name: 🛠️ Generate latest.json (Tauri Updater)
        run: |
          # Extrahiere den Tag-Namen aus dem Git-Repository
          VERSION_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")

          if [ -z "$VERSION_TAG" ]; then
            echo "❌ Kein git tag für diesen Commit gefunden. Release wird abgebrochen."
            exit 1
          fi

          VERSION="${VERSION_TAG#v}"
          echo "📦 Version: $VERSION (Tag: $VERSION_TAG)"

          SIG_FILE="$(find windows-build -type f -name '*.zip.sig' -print -quit)"

          if [ -z "$SIG_FILE" ]; then
            echo "❌ FEHLER: Keine .zip.sig Datei gefunden!"
            echo "Inhalt von windows-build:"
            find windows-build -type f
            exit 1
          fi

          ZIP_FILE="${SIG_FILE%.sig}"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "❌ FEHLER: ZIP-Datei nicht gefunden: $ZIP_FILE"
            exit 1
          fi

          SIG="$(cat "$SIG_FILE")"
          ZIP_NAME="$(basename "$ZIP_FILE")"

          jq -nc \
            --arg ver "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/$ZIP_NAME" \
            '{
              "version": $ver,
              "notes": "JumpStone Launcher Update",
              "pub_date": now | todateiso8601,
              "platforms": {
                "windows-x86_64": {
                  "signature": $sig,
                  "url": $url
                }
              }
            }' > latest.json

          echo "✅ latest.json erstellt:"
          cat latest.json

          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"

      - name: 🏷️ Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_TAG="${{ env.VERSION_TAG }}"

          if [ -z "$VERSION_TAG" ]; then
            echo "❌ VERSION_TAG nicht gesetzt!"
            exit 1
          fi

          # Sammle alle Dateien
          ASSETS=()
          while IFS= read -r -d '' file; do
            ASSETS+=("$file")
          done < <(find windows-build -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.zip' \) -print0)

          # Füge latest.json hinzu, wenn vorhanden
          if [ -f latest.json ]; then
            ASSETS+=("latest.json")
            echo "✅ latest.json wird zu Assets hinzugefügt"
          else
            echo "⚠️ latest.json nicht gefunden"
          fi

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "❌ Keine Release-Assets gefunden!"
            exit 1
          fi

          echo "📤 Erstelle Release für Tag: $VERSION_TAG"
          echo "📦 Assets: ${ASSETS[@]}"

          gh release create "$VERSION_TAG" \
            --title "JS Gaming App $VERSION_TAG" \
            --notes "Automatischer Release von JumpStone Gaming" \
            "${ASSETS[@]}"
