name: Modrinth App release
on:
  workflow_run:
    workflows: ['Modrinth App build']
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Release JS Gaming App
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: 🔖 Resolve release tag
        id: resolve_tag
        run: |
          VERSION_TAG=""
          while IFS= read -r tag; do
            if [[ "$tag" == v* ]]; then
              VERSION_TAG="$tag"
              break
            fi
          done < <(git tag --points-at HEAD)

          if [ -z "$VERSION_TAG" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Kein Release-Tag für diesen Commit gefunden. Release wird übersprungen."
            exit 0
          fi

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: 📥 Download Build Artifacts
        if: steps.resolve_tag.outputs.found == 'true'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: theseus-build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: App bundle (x86_64-pc-windows-msvc)
          path: windows-build

      - name: 🛠️ Generate latest.json (Tauri Updater)
        if: steps.resolve_tag.outputs.found == 'true'
        env:
          VERSION_TAG: ${{ steps.resolve_tag.outputs.version_tag }}
        run: |
          VERSION="${VERSION_TAG#v}"
          echo "📦 Version: $VERSION (Tag: $VERSION_TAG)"

          SIG_FILE="$(find windows-build -type f \( -name '*.exe.sig' -o -name '*.msi.sig' \) -print -quit)"

          if [ -z "$SIG_FILE" ]; then
            echo "❌ FEHLER: Keine .exe.sig oder .msi.sig Datei gefunden!"
            echo "Inhalt von windows-build:"
            find windows-build -type f
            exit 1
          fi

          INSTALLER_FILE="${SIG_FILE%.sig}"

          if [ ! -f "$INSTALLER_FILE" ]; then
            echo "❌ FEHLER: Installer-Datei nicht gefunden: $INSTALLER_FILE"
            exit 1
          fi

          SIG="$(cat "$SIG_FILE")"
          INSTALLER_NAME="$(basename "$INSTALLER_FILE")"

          jq -nc \
            --arg ver "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/$INSTALLER_NAME" \
            '{
              "version": $ver,
              "notes": "JumpStone Launcher Update",
              "pub_date": now | todateiso8601,
              "platforms": {
                "windows-x86_64": {
                  "signature": $sig,
                  "url": $url
                }
              }
            }' > latest.json

          echo "✅ latest.json erstellt:"
          cat latest.json

      - name: 🏷️ Create GitHub Release
        if: steps.resolve_tag.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ steps.resolve_tag.outputs.version_tag }}
        run: |
          if [ -z "$VERSION_TAG" ]; then
            echo "❌ VERSION_TAG nicht gesetzt!"
            exit 1
          fi

          # Sammle alle Dateien
          ASSETS=()
          while IFS= read -r -d '' file; do
            ASSETS+=("$file")
          done < <(find windows-build -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.zip' \) -print0)

          # Füge latest.json hinzu, wenn vorhanden
          if [ -f latest.json ]; then
            ASSETS+=("latest.json")
            echo "✅ latest.json wird zu Assets hinzugefügt"
          else
            echo "⚠️ latest.json nicht gefunden"
          fi

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "❌ Keine Release-Assets gefunden!"
            exit 1
          fi

          echo "📤 Erstelle Release für Tag: $VERSION_TAG"
          echo "📦 Assets: ${ASSETS[@]}"

          gh release create "$VERSION_TAG" \
            --title "JS Gaming App $VERSION_TAG" \
            --notes "Automatischer Release von JumpStone Gaming" \
            "${ASSETS[@]}"
