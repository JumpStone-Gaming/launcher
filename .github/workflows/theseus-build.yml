name: Modrinth App build
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
        include:
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false # WICHTIG: Verhindert Abbrüche durch fremde Submodule

      - name: Cleanup Windows Runner
        # Dieser Schritt beendet blockierende Prozesse, BEVOR Tools installiert werden
        run: |
          Get-Process vctip -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process msbuild -ErrorAction SilentlyContinue | Stop-Process -Force
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgrade auf die neueste stabile Version
          # Wir lassen den Cache erst mal weg, um Fehler durch alte Caches zu vermeiden

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set application version
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          [ "$APP_VERSION" == "main" ] && APP_VERSION="0.1.0-dev"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          # Patcht die Version in die package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$APP_VERSION\"/" apps/app-frontend/package.json

      - name: Install dependencies
        # Wir nutzen --no-frozen-lockfile, damit pnpm kleine Abweichungen selbst heilt
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows app
        timeout-minutes: 120
        run: pnpm app:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            apps/app/src-tauri/target/release/bundle/nsis/*.exe
            apps/app/src-tauri/target/release/bundle/nsis/*.zip
            apps/app/src-tauri/target/release/bundle/nsis/*.sig
