name: Modrinth App build
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
        include:
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Nur den aktuellsten Stand laden (spart Zeit & Fehler)
          submodules: false # Submodule komplett ignorieren
          persist-credentials: false # Verhindert Rechte-Konflikte beim Checkout

      - name: Force Kill Build Processes
        # Wir killen alles, was den Checkout oder pnpm blockieren könnte
        run: |
          Get-Process vctip, msbuild, git -ErrorAction SilentlyContinue | Stop-Process -Force
        shell: pwsh

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Cache erst mal weglassen, um "Gift" im Build auszuschließen

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set application version
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          [ "$APP_VERSION" == "main" ] && APP_VERSION="0.1.0-0"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          # Patcht die Version
          sed -i "s/\"version\": \".*\"/\"version\": \"$APP_VERSION\"/" apps/app-frontend/package.json

      - name: Install dependencies
        # --no-frozen-lockfile ist hier die Rettung für Portabilitätsfehler
        run: pnpm install --no-frozen-lockfile

      - name: Prepare app-lib environment
        shell: pwsh
        run: Copy-Item packages/app-lib/.env.prod packages/app-lib/.env -Force

      - name: Build Windows app
        timeout-minutes: 60
        run: pnpm app:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload app bundles
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.zip
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.msi
