name: Modrinth App build
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        # Wir starten erst mal nur mit Windows, um Fehlerquellen zu minimieren.
        # Du kannst später 'macos-latest' und 'ubuntu-latest' wieder hinzufügen.
        platform: [windows-latest]
        include:
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set application version
        shell: bash
        run: |
          # Nutzt den Git-Tag als Version oder einen Fallback
          APP_VERSION="${GITHUB_REF_NAME#v}"
          [ "$APP_VERSION" == "main" ] && APP_VERSION="0.1.0-dev"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          # Versionen in den Configs patchen (ohne das Tool 'dasel' zu brauchen)
          sed -i "s/\"version\": \".*\"/\"version\": \"$APP_VERSION\"/" apps/app-frontend/package.json

      - name: Prepare app-lib env
        shell: bash
        run: cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows app
        shell: pwsh
        run: |
          # Wir bauen hier IMMER mit der normalen tauri.conf.json, da wir tauri-release.conf gelöscht haben
          pnpm --filter=@modrinth/app run tauri build --verbose --bundles "nsis,updater"
        env:
          # Diese Secrets musst du in GitHub hinterlegen (siehe Anleitung unten)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          path: |
            apps/app/src-tauri/target/release/bundle/nsis/*.exe
            apps/app/src-tauri/target/release/bundle/nsis/*.zip
            apps/app/src-tauri/target/release/bundle/nsis/*.sig
